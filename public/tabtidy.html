<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>TabTidy History</title>
    <link rel="stylesheet" href="./tabtidy.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Browser housekeeping</p>
          <h1>TabTidy</h1>

          <p class="lede">
            Closed tabs are grouped by tidy run here, so you can quickly revisit
            what was tidied away and remove anything you no longer need to keep.
          </p>
        </div>

        <img
          class="hero-icon"
          src="./icons/tabtidy.png"
          alt="TabTidy icon"
        />
      </header>

      <main>
        <div data-history-root></div>
      </main>
    </div>

    <script type="module" src="./history.js"></script>
  </body>
</html>
